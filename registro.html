<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <style>
        body {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(128, 0, 128, 0.1));
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        form {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        button {
            background: linear-gradient(90deg, rgba(0, 255, 255), rgba(128, 0, 128));
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.5s;
        }
        button:hover {
            background: linear-gradient(90deg, rgba(128, 0, 128), rgba(0, 255, 255));
        }
    </style>
</head>
<body>
    <form>
        <h2>Registro</h2>
        <input type="text" placeholder="Nombre" required /><br/><br/>
        <input type="email" placeholder="Correo" required /><br/><br/>
        <input type="password" placeholder="Contraseña" required /><br/><br/>
        <button type="submit">Registrar</button>
    </form>
</body>
</html>
